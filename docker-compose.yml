version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ssd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssd-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ssd-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssd-network

  # OpenClaw Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ssd-gateway
    ports:
      - "18789:18789"
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT}
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ssd-network
    restart: unless-stopped

  # Quantum API
  api:
    build:
      context: ./quantum-api
      dockerfile: Dockerfile
    container_name: ssd-api
    ports:
      - "3000:3000"
    environment:
      API_PORT: ${API_PORT}
      API_JWT_SECRET: ${API_JWT_SECRET}
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY}
      NODE_ENV: ${NODE_ENV}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway:
        condition: service_started
    networks:
      - ssd-network
    restart: unless-stopped

  # N8n Workflow Engine
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    container_name: ssd-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: ${N8N_PORT}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DB_TYPE: ${N8N_DB_TYPE}
      N8N_DB_HOST: postgres
      N8N_DB_USER: ${POSTGRES_USER}
      N8N_DB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_DB_DATABASE: n8n
      N8N_REDIS_HOST: redis
      N8N_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ssd-network
    restart: unless-stopped

  # Blog Frontend
  blog:
    build:
      context: ./blog-frontend
      dockerfile: Dockerfile
    container_name: ssd-blog
    ports:
      - "80:80"
      - "443:443"
    environment:
      NODE_ENV: ${NODE_ENV}
      API_ENDPOINT: http://api:3000
      GATEWAY_ENDPOINT: http://gateway:18789
    depends_on:
      - api
      - gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - ssd-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ssd-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ssd-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ssd-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-worldmap-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ssd-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ssd-network:
    driver: bridge
