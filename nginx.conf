# =============================================================================
# Sun State Digital — Nginx Production Configuration
# Reverse proxy for all SSD services with SSL, security headers, rate limiting
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65536;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json
        '{"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"method": "$request_method",'
        '"uri": "$request_uri",'
        '"status": $status,'
        '"bytes_sent": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_time": "$upstream_response_time",'
        '"referer": "$http_referer",'
        '"user_agent": "$http_user_agent",'
        '"x_forwarded_for": "$http_x_forwarded_for"}';

    access_log /var/log/nginx/access.log json_combined;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.api+json
        image/svg+xml
        font/truetype
        font/opentype;

    # --- Rate Limiting ---
    # API rate limiting: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    # Webhook rate limiting: 30 per minute (more strict)
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/m;
    # General rate limiting: 200 per minute
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/m;
    # Login rate limiting: 10 per minute (anti-brute-force)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --- Upstream Backends ---
    upstream openclaw_backend {
        server openclaw-gateway:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream quantum_backend {
        server quantum-api:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream blog_backend {
        server blog-frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 8;
    }

    # --- SSL Configuration ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Let's Encrypt certificate (wildcard *.ssd.cloud)
    ssl_certificate /etc/letsencrypt/live/ssd.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ssd.cloud/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ssd.cloud/chain.pem;

    # --- Security Headers (applied globally) ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ==========================================================================
    # HTTP → HTTPS Redirect (all domains)
    # ==========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # ssd.cloud — Main Dashboard (OpenClaw Gateway)
    # ==========================================================================
    server {
        listen 443 ssl http2;
        server_name ssd.cloud www.ssd.cloud;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # CSP
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.ssd.cloud https://quantum.ssd.cloud wss:; frame-ancestors 'none';" always;

        # Rate limiting
        limit_req zone=general_limit burst=50 nodelay;
        limit_conn conn_limit 50;

        # Proxy to OpenClaw Gateway
        location / {
            proxy_pass http://openclaw_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;

            # Health check endpoint passthrough
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # Login endpoint — strict rate limiting
        location /auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://openclaw_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================================================
    # api.ssd.cloud + openclaw.ssd.cloud — OpenClaw API Gateway
    # ==========================================================================
    server {
        listen 443 ssl http2;
        server_name api.ssd.cloud openclaw.ssd.cloud;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Access-Control-Allow-Origin "https://ssd.cloud" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;

        # Preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-API-Key';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }

        # API rate limiting
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://openclaw_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Webhook endpoints — different rate limit
        location /webhooks/ {
            limit_req zone=webhook_limit burst=10 nodelay;

            proxy_pass http://openclaw_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Health check — no rate limiting
        location /health {
            proxy_pass http://openclaw_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://openclaw_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================================================
    # quantum.ssd.cloud — Quantum Backend API (FastAPI)
    # ==========================================================================
    server {
        listen 443 ssl http2;
        server_name quantum.ssd.cloud;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Quantum API rate limiting
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://quantum_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;  # Allow time for AI operations
            proxy_connect_timeout 10s;
        }

        location /health {
            proxy_pass http://quantum_backend;
            access_log off;
        }

        # FastAPI docs — restrict to internal
        location ~ ^/(docs|redoc|openapi.json)$ {
            # Uncomment to restrict to VPN/internal only:
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://quantum_backend;
            proxy_set_header Host $host;
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://quantum_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================================================
    # blog.ssd.cloud — Blog Frontend (Next.js)
    # ==========================================================================
    server {
        listen 443 ssl http2;
        server_name blog.ssd.cloud;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com;" always;

        limit_req zone=general_limit burst=100 nodelay;

        # Static assets — cache aggressively
        location /_next/static/ {
            proxy_pass http://blog_backend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Images
        location /images/ {
            proxy_pass http://blog_backend;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location / {
            proxy_pass http://blog_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;

            # Cache pages
            expires 1m;
            add_header Cache-Control "public, max-age=60";
        }
    }

    # ==========================================================================
    # monitor.ssd.cloud — Grafana Dashboard
    # ==========================================================================
    server {
        listen 443 ssl http2;
        server_name monitor.ssd.cloud;

        add_header Strict-Transport-Security "max-age=31536000" always;
        # No public caching for monitoring
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # WebSocket support for Grafana live
        location / {
            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }
    }

    # ==========================================================================
    # Default server — reject unknown hostnames
    # ==========================================================================
    server {
        listen 443 ssl default_server;
        server_name _;
        return 444;
    }
}
